{% macro performance_chart(id_suffix, symbol_name, symbols_json, txs_json, income_json, rate) %}
<div class="performance-analytics-box-wrapper">
    <div class="chart-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0;">📊 Performance Analytics (SGD)</h3>
        <div class="chart-controls" style="margin: 0;">
            {% if symbols_json %}
                <button class="toggle-btn active" onclick="toggleChartMode('und-{{ id_suffix }}', 'val', this)">Performance (Val)</button>
                <button class="toggle-btn" onclick="toggleChartMode('und-{{ id_suffix }}', 'pct', this)">Performance (%)</button>
                <button class="toggle-btn" onclick="updateUnderlyingChart('{{ id_suffix }}', 'flow', 'month', this)">Flow (Mo)</button>
                <button class="toggle-btn" onclick="updateUnderlyingChart('{{ id_suffix }}', 'flow', 'year', this)">Flow (Yr)</button>
                <button class="toggle-btn" onclick="updateUnderlyingChart('{{ id_suffix }}', 'income', 'month', this)">Inc (Mo)</button>
                <button class="toggle-btn" onclick="updateUnderlyingChart('{{ id_suffix }}', 'income', 'year', this)">Inc (Yr)</button>
            {% else %}
                <button class="toggle-btn active" onclick="updateSymbolChart('{{ symbol_name }}', 'flow', 'month', this)">Flow (Mo)</button>
                <button class="toggle-btn" onclick="updateSymbolChart('{{ symbol_name }}', 'flow', 'year', this)">Flow (Yr)</button>
                <button class="toggle-btn" onclick="updateSymbolChart('{{ symbol_name }}', 'income', 'month', this)">Inc (Mo)</button>
                <button class="toggle-btn" onclick="updateSymbolChart('{{ symbol_name }}', 'income', 'year', this)">Inc (Yr)</button>
            {% endif %}
        </div>
    </div>
    <div id="chart-{{ 'und-' if symbols_json else '' }}{{ id_suffix }}" 
         class="chart-container {{ 'underlying-chart-container' if symbols_json else 'symbol-chart-container' }}" 
         {% if symbol_name %}data-symbol="{{ symbol_name }}"{% endif %}
         {% if symbols_json %}data-symbols-data='{{ symbols_json | safe }}'{% endif %}
         {% if txs_json %}data-txs='{{ txs_json | safe }}'{% endif %}
         {% if income_json %}data-income='{{ income_json | safe }}'{% endif %}
         data-rate="{{ rate | default('1.0') }}"
         style="min-height: 400px;">
    </div>
</div>
{% endmacro %}
